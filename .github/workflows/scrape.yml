name: 🏠 Daily Listings Scraper + Deploy

on:
  schedule:
    # 9:00 AM UTC = 4:00 AM CDT (lunes a viernes)
    - cron: '0 9 * * 1-5'
  workflow_dispatch:
    # Permite correrlo manualmente desde GitHub Actions UI
    inputs:
      debug:
        description: 'Modo debug (verbose)'
        required: false
        default: 'false'

jobs:
  scrape:
    name: Scrape, Update & Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write

    steps:
      - name: ⬇️ Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🐍 Setup Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 📦 Instalar dependencias Python
        run: |
          pip install curl_cffi requests python-dateutil playwright

      - name: 🌐 Instalar Playwright Chromium
        run: playwright install chromium --with-deps

      - name: 🕷️ Correr scraper
        env:
          ML_APP_ID: ${{ secrets.ML_APP_ID }}
          ML_APP_SECRET: ${{ secrets.ML_APP_SECRET }}
          PROXY_URL: ${{ secrets.PROXY_URL }}
        run: python scraper/scrape.py

      - name: 📊 Verificar resultados
        run: |
          echo "=== listings.json ==="
          cat data/listings.json | python3 -c "
          import json,sys
          data = json.load(sys.stdin)
          meta = data['_meta']
          print(f'Total: {meta[\"total\"]} propiedades')
          print(f'Actualizado: {meta[\"actualizado\"]}')
          print(f'Fuentes: {\", \".join(meta[\"fuentes\"])}')
          "

      - name: 💾 Commit y push si hay cambios
        id: git_push
        run: |
          git config --global user.email "bot@cloudinmobiliaria.mx"
          git config --global user.name "Cloud Inmo Bot"
          git add data/listings.json data/img/ mapa.html
          if git diff --staged --quiet; then
            echo "Sin cambios. Nada que commitear."
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            TOTAL=$(cat data/listings.json | python3 -c "import json,sys; d=json.load(sys.stdin); print(d['_meta']['total'])")
            git commit -m "🏠 Portal actualizado: ${TOTAL} props · $(TZ='America/Mexico_City' date +'%Y-%m-%d %H:%M CDT')"
            git push
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "✅ Portal actualizado y publicado"
          fi

      - name: 🚀 Deploy a Vercel (siempre, haya o no cambios)
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          npm install -g vercel --silent
          vercel pull --yes --environment=production --token=$VERCEL_TOKEN
          vercel build --prod --token=$VERCEL_TOKEN
          vercel deploy --prebuilt --prod --token=$VERCEL_TOKEN
          echo "✅ Portal actualizado en https://cloud-terralta-portal.vercel.app"

      - name: 📢 Notificación si falla
        if: failure()
        run: |
          echo "❌ El scraper o deploy falló. Revisar logs de GitHub Actions."
